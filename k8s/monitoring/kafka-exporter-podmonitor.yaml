apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: kafka-exporter-metrics
  namespace: monitoring
  labels:
    release: kube-prometheus-stack
spec:
  selector:
    matchLabels:
      strimzi.io/name: my-cluster-kafka-exporter
  namespaceSelector:
    matchNames:
      - strimzi
  podMetricsEndpoints:
    - port: tcp-prometheus
